name: ilri01
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - requests
  - pandas
  - pyyaml
  - tqdm
  - python-dotenv
  - rich
  - matplotlib
  - seaborn      
  - openpyxl     
  - python-docx
  - pillow
  - pip:
      - typer>=0.9
      - reportlab
      - pypdf               # step14: PDF text extraction
      - trafilatura         # step14: HTML text extraction (optional but recommended)
      - beautifulsoup4      # step14: HTML fallback parser
      - json-repair         # step12/14: LLM JSON response repair
      - geopandas           # step16: geographic mapping
      - plotly              # step16: interactive figures