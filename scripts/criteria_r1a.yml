# Eligibility Criteria for Climate Adaptation Effectiveness Review
# Referenced in Step 10 (Eligibility Check)

hard_filters:
  min_year: 2005

criteria:
  1_population:
    name: "POPULATION (Smallholders)"
    include: "Must focus on Smallholder producers or households (crop, livestock, fisheries, forestry)."
    exclude: "Large-scale commercial agriculture, agribusiness value chains without smallholder focus, or non-agricultural livelihoods."
    r1_include_further_guidelines: >
      A clear LMIC rural producer context implying small-scale agriculture qualifies even without
      the word 'smallholder'. Mixed samples that include smallholders alongside larger producers
      should be included at the abstract screening stage.
    r1_exclude_further_guidelines: >
      Purely agronomic or biophysical crop trials where farmers or households are not the unit of
      analysis (i.e., the study focuses only on plants, soils, or crop varieties — not on
      producer-level behavior, adoption, or welfare).

  2_concept:
    name: "CONCEPT (Adaptation)"
    include: "Must assess adaptation processes or outcomes (e.g., resilience, risk reduction, adaptive capacity)."
    exclude: "Mitigation ONLY (reducing emissions), or general development/agronomy without explicit climate risk framing."
    r1_include_further_guidelines: >
      Assessing adoption or uptake of adaptation technologies qualifies. Identifying determinants
      of adoption explicitly counts as measuring an adaptation process and should be included.
      Descriptive reporting of adoption rates qualifies. Climate-linked resilience measurement
      qualifies.
    r1_exclude_further_guidelines: >
      Studies that measure climate IMPACTS on crops or income without assessing any adaptation
      action or process (hazard impact only). General climate-smart agriculture (CSA) discussion
      that describes technologies or concepts but does not evaluate uptake, adoption process, or
      adaptation outcomes. Generic development resilience without any climate framing.

  3_context:
    name: "CONTEXT (Ag + Climate Risk)"
    include: "Agricultural settings explicitly exposed to climate hazards (drought, flood, variability, temperature rise)."
    exclude: "Non-agricultural sectors, or studies that do not link agricultural issues to climate change/variability."
    r1_include_further_guidelines: >
      Climate change, climate variability, or specific climate hazards must be explicitly
      referenced as central to the study — not just incidental or background context.
      Adaptation (not just impact assessment) must be central to the study purpose.
    r1_exclude_further_guidelines: >
      Studies where climate is mentioned only incidentally or as background context with no
      direct link to the agricultural problem being studied. Studies where climate is clearly
      peripheral and not driving the research question.

  4_methodology:
    name: "METHODOLOGY (Empirical Evidence)"
    include: "Must provide empirical evidence (qualitative or quantitative) or scenario-based testing of an intervention or tool."
    exclude: "Purely theoretical papers, conceptual frameworks without application, or review papers without primary data analysis."
    r1_include_further_guidelines: >
      Statistical or econometric models analyzing adaptation outcomes, adoption rates, or
      determinants of adoption qualify. Participatory assessments of adaptation or vulnerability
      qualify. Effectiveness evaluations using real-world or survey data qualify. Key principle:
      this review maps methods used to MEASURE adaptation — not the technologies themselves. A
      study evaluating 'how adoption is determined' or 'how effective an adaptation strategy is'
      qualifies even if a specific technology is the subject.
    r1_exclude_further_guidelines: >
      Pure technology performance modeling: simulates or optimizes how a crop variety or
      technology performs under climate scenarios without assessing producer-level adaptive
      behavior, adoption, or adaptation measurement. Heuristic: if it models 'how the technology
      performs' but not 'how adaptation is measured or adopted' -> exclude. Strategy or policy
      documents lacking methodological implementation. Pure predictive adoption modeling without
      empirical measurement context.

  5_geography:
    name: "GEOGRAPHY (LMIC)"
    include: "Must be conducted in Low- or Middle-Income Countries (LMICs) or the Global South."
    exclude: "Exclusively High-Income / OECD countries (e.g., USA, UK, EU, Australia, Canada)."
    r1_include_further_guidelines: >
      A clear LMIC rural context can simultaneously satisfy both the geography and population
      criteria. If the study covers multiple countries including both OECD and LMIC, include it.
    r1_exclude_further_guidelines: ""
