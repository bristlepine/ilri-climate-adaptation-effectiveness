# LLM Extraction Criteria — sysmap v1
# Used in: FT-R1a, FT-R1b
# Updated: 2026-04-27 (tightened field definitions; domain_type and validity_notes removed)
# Loaded by: scripts/step15_extract_data.py

fields:

  publication_year:
    name: "Publication Year"
    extract: >
      Year of publication. Use the most recent version date if both preprint and journal exist.
    valid_values: "integer e.g. 2021"

  publication_type:
    name: "Publication Type"
    extract: >
      journal_article = peer-reviewed journal.
      report = project/programme report, evaluation report, policy brief.
      working_paper = pre-publication working paper or discussion paper.
      thesis = PhD or master's dissertation.
      other = book chapter, conference paper, dataset paper.
    valid_values: "journal_article | report | working_paper | thesis | other"

  country_region:
    name: "Country/Region"
    extract: >
      Countries where the study was conducted, separated by semicolons.
      Use a region label only if no countries are named. Enter 'Global' for global reviews.
    valid_values: "e.g. Kenya; Ethiopia  or  Sub-Saharan Africa  or  Global"

  geographic_scale:
    name: "Geographic Scale"
    extract: >
      Scale of the study population — where subjects are located, not where data was collected.
      local = single village, community, or site.
      sub-national = district, province, or region within one country. Use when the study
                     covers part of a country; also use when only a country name is mentioned
                     with no indication of national-level coverage.
      national = explicitly national-level or nationally representative study.
      multi-country = two or more distinct countries are named as study locations — always
                      use this when multiple country names appear as study sites.
      regional = broad region (e.g. West Africa) without country-level focus.
    valid_values: "local | sub-national | national | multi-country | regional"

  producer_type:
    name: "Producer Type(s)"
    extract: >
      Select all that apply, separated by semicolons.
      crop = crop farmers. livestock = pastoralists, dairy/beef farmers.
      fisheries_aquaculture = artisanal fishing, small-scale aquaculture.
      agroforestry = tree crop or silvopastoral systems.
      mixed = explicitly mixed crop-livestock (must be stated, not inferred).
      undefined = study refers only to generic 'smallholder farmers' with no system specified.
    valid_values: "crop | livestock | fisheries_aquaculture | agroforestry | mixed | undefined"

  marginalized_subpopulations:
    name: "Marginalized Subpopulations"
    extract: >
      Code only groups explicitly named in the paper. Do not infer.
      none_reported is mutually exclusive — do not combine with any other value.
    valid_values: "women | youth | people_with_disabilities | landless | indigenous_peoples | ethnic_minorities | migrant_seasonal_workers | other | none_reported"

  adaptation_focus:
    name: "Adaptation Focus"
    extract: >
      The specific adaptation action, intervention, or practice the study tracks. 5–15 words.
    valid_values: "free text e.g. 'drought-tolerant crop varieties' or 'seasonal climate forecasts for farmers'"

  process_outcome_domains:
    name: "Process and Outcome Domains Assessed"
    extract: >
      Code only domains that have dedicated indicators or analysis in the paper — not domains
      merely mentioned in background. Select all that apply, separated by semicolons.
      knowledge_awareness_learning | decision_making_planning | uptake_adoption |
      behavioral_change | participation_coproduction | institutional_governance |
      access_information_services | yields_productivity | income_assets |
      livelihoods | wellbeing | risk_reduction | resilience_adaptive_capacity
    valid_values: "knowledge_awareness_learning | decision_making_planning | uptake_adoption | behavioral_change | participation_coproduction | institutional_governance | access_information_services | yields_productivity | income_assets | livelihoods | wellbeing | risk_reduction | resilience_adaptive_capacity"

  indicators_measured:
    name: "Indicators Measured"
    extract: >
      Specific indicators from the methods or results. Include units where given.
    valid_values: "free text e.g. 'yield (t/ha), income (USD/season), adoption rate (%)'"

  methodological_approach:
    name: "Methodological Approach"
    extract: >
      Select all that apply, separated by semicolons.
      qualitative = interviews, focus groups, ethnography.
      quantitative = surveys, statistical analysis, trials.
      participatory = only when PRA, photovoice, or farmer-led trial is the primary design.
                      Semi-structured interviews, in-depth interviews, focus groups = qualitative, not participatory.
      modeling_with_empirical_validation = only when the paper explicitly builds and validates
                      a simulation or process model (crop model, ABM). Statistical analysis
                      and regression are not modeling.
      experimental = RCTs, natural experiments, quasi-experimental designs.
    valid_values: "qualitative | quantitative | participatory | modeling_with_empirical_validation | experimental"

  purpose_of_assessment:
    name: "Purpose of Assessment"
    extract: >
      research = academic study with no programme affiliation.
      program_evaluation = commissioned evaluation of a named programme or project.
      project_learning = M&E embedded within an ongoing project.
      donor_reporting = produced for funder accountability.
      national_reporting = contributing to NAPs, NDCs, or national monitoring frameworks.
    valid_values: "research | project_learning | program_evaluation | donor_reporting | national_reporting"

  data_sources:
    name: "Data Sources"
    extract: >
      Select all that apply, separated by semicolons.
      surveys = household or farm-level questionnaires.
      participatory_methods = focus groups, key informant interviews, PRA, semi-structured interviews.
      administrative_data = government records, national statistics.
      remote_sensing = satellite or drone imagery.
      secondary_data = existing datasets or literature.
      other = anything not listed above.
    valid_values: "surveys | participatory_methods | administrative_data | remote_sensing | secondary_data | other"

  temporal_coverage:
    name: "Temporal Coverage"
    extract: >
      cross_sectional = single point in time.
      seasonal = across one or a few seasons (intra-annual).
      longitudinal = multi-year, same individuals tracked over time.
      repeated_cross_sectional = multi-year, different individuals each time.
    valid_values: "cross_sectional | seasonal | longitudinal | repeated_cross_sectional"

  cost_data_reported:
    name: "Cost Data Reported"
    extract: >
      yes = paper reports cost figures or cost-effectiveness ratios.
      no = cost not reported, or mentioned only qualitatively.
    valid_values: "yes | no"

  strengths_and_limitations:
    name: "Strengths and Limitations"
    extract: >
      Author-reported strengths and limitations. Format: 'Strength: ... Limitation: ...'
      Look in Discussion and Limitations sections. Enter 'not_reported' if absent.
    valid_values: "free text"

  lessons_learned:
    name: "Lessons Learned"
    extract: >
      Key author recommendations for policy or practice. 1–3 sentences.
      Enter 'not_reported' if absent.
    valid_values: "free text"
