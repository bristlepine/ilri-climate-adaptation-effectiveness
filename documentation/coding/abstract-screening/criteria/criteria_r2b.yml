# Eligibility Criteria for Climate Adaptation Effectiveness Review
# Referenced in Step 10 (Eligibility Check)

hard_filters:
  min_year: 2005

criteria:
  1_population:
    name: "POPULATION (Smallholders)"
    include: "Must focus on Smallholder producers or households (crop, livestock, fisheries, forestry)."
    exclude: "Large-scale commercial agriculture, agribusiness value chains without smallholder focus, or non-agricultural livelihoods."
    r1_include_further_guidelines: >
      A clear LMIC rural producer context implying small-scale agriculture qualifies even without
      the word 'smallholder'. Mixed samples that include smallholders alongside larger producers
      should be included at the abstract screening stage.
    r1_exclude_further_guidelines: >
      Purely agronomic or biophysical crop trials where farmers or households are not the unit of
      analysis (i.e., the study focuses only on plants, soils, or crop varieties — not on
      producer-level behavior, adoption, or welfare).
      Crop variety or germplasm trials where smallholder farmers appear only as statistical
      background (e.g., area under cultivation figures) but are not the subject of behavioral,
      adoption, or livelihood analysis.
    r2_include_further_guidelines: >
      Mixed or unclear populations where a smallholder or low-income producer context remains
      plausible should be retained at title-abstract stage.
      Do not exclude a study solely because the abstract is poorly written or grammatically weak —
      if it still signals a relevant producer population, retain it.
      A label of "industrial" in the title does not automatically exclude a study if the abstract
      explicitly discusses climate adaptation, resilience, or adaptive responses among producers
      in an LMIC context — retain when the actual content concerns producer-level climate responses.
      Fishing and aquaculture communities in LMIC contexts (Bangladesh, Indonesia, Vietnam, etc.)
      qualify even if labeled "industrial" — the key question is whether producers in an LMIC
      context are the unit of analysis, not the scale label in the title.
      Riparian, coastal, and fishing communities facing climate-related hazards (erosion, flooding,
      salinity) qualify under smallholder/subsistence producer populations.
      Rural households or communities adapting livelihoods to climate stress qualify even if
      the study covers multiple livelihood strategies beyond agriculture alone.
      IMPORTANT ABSTRACT-STAGE RULE: When the population is plausibly smallholder or low-income
      producer in an LMIC setting, INCLUDE. Do not require explicit use of the word "smallholder"
      — rural producer contexts in LMICs with climate adaptation relevance qualify.
    r2_exclude_further_guidelines: >
      Exclude when the population clearly and unambiguously consists of large commercial farms,
      corporate agribusiness, or high-income country producers with no LMIC component.
      Do not exclude when there is genuine ambiguity about farm scale or producer type.

  2_concept:
    name: "CONCEPT (Adaptation)"
    include: "Must assess adaptation processes or outcomes (e.g., resilience, risk reduction, adaptive capacity)."
    exclude: "Mitigation ONLY (reducing emissions), or general development/agronomy without explicit climate risk framing."
    r1_include_further_guidelines: >
      Assessing adoption or uptake of adaptation technologies qualifies. Identifying determinants
      of adoption explicitly counts as measuring an adaptation process and should be included.
      Descriptive reporting of adoption rates qualifies. Climate-linked resilience measurement
      qualifies.
    r1_exclude_further_guidelines: >
      Studies that measure climate IMPACTS on crops or income without assessing any adaptation
      action or process (hazard impact only). General climate-smart agriculture (CSA) discussion
      that describes technologies or concepts but does not evaluate uptake, adoption process, or
      adaptation outcomes. Generic development resilience without any climate framing.
      Vulnerability assessments (e.g., using Livelihood Vulnerability Index, LVI-IPCC, or similar
      frameworks) that ONLY quantify exposure, sensitivity, or vulnerability scores without
      measuring any adaptation action, adoption decision, or adaptation outcome -> EXCLUDE.
      Key test: does the study measure "what adaptation was done or how effectively?" — if it
      only measures "how vulnerable is this community?", exclude it.
      Perception/awareness studies that document what farmers think or know about climate change
      but do not measure any adoption behavior or adaptation response -> EXCLUDE.
      Studies measuring how climate variability affects livelihoods, food security, or income
      without any adaptation intervention, adoption measurement, or adaptive behavior -> EXCLUDE
      (these are exposure/impact studies, not adaptation studies).
    r2_include_further_guidelines: >
      Vulnerability studies may be included when the abstract explicitly states that the study
      examines adaptation strategies, adaptive capacity, coping or anticipatory responses,
      livelihood responses, or farmer responses to climate risk — even without a formal
      intervention. Qualitative, ethnographic, or descriptive case studies that examine real
      autonomous adaptation behavior or farmer-led responses to climate stress qualify.
      Adaptation must be part of the actual analysis, not just mentioned as motivation.
      Livelihood diversification in response to climate stress or food insecurity qualifies
      as an adaptation strategy — include these even if the word "adaptation" is not used.
      Studies measuring how producers cope with, adjust to, or change behavior in response
      to climate variability (e.g., changing crop choices, labor reallocation, migration,
      livelihood switching) qualify as adaptation measurement — include at this stage.
      Seed variety choice, technology acceptance, and input adoption studies in smallholder
      contexts under climate variability qualify — these are adoption/adaptation processes.
      Studies on coping strategies, resilience building, or vulnerability reduction that
      include some analysis of what producers do (not just how vulnerable they are) -> INCLUDE.
      Acceptance, adoption, and uptake of agricultural water management systems, irrigation
      technologies, or climate-smart practices among smallholder farmers qualifies as
      adaptation process measurement — include even if the word "adaptation" is absent.
      Attitudes toward adoption, willingness to adopt, and technology acceptance among
      smallholder farmers in LMIC agricultural contexts qualify as adaptation process measurement.
      CSA (climate-smart agriculture) adoption, implementation, and uptake studies qualify
      as long as smallholder farmers or producers are the unit of analysis — even if the
      abstract focuses on policy strategies or key findings rather than a single intervention.
      Studies examining climate change effects on agricultural productivity in smallholder
      farming systems qualify — even if framed primarily as impact assessment, productivity
      studies in smallholder contexts are directly relevant to adaptation measurement and
      should be included at abstract screening stage.
      IMPORTANT ABSTRACT-STAGE RULE: When uncertain whether a study measures adaptation
      or just impacts, INCLUDE it. False negatives (missing relevant papers) are more
      costly than false positives at this stage — full-text screening will catch borderline
      cases. Err on the side of inclusion.
    r2_exclude_further_guidelines: >
      Vulnerability studies where the primary focus is poverty, food insecurity, or generalized
      vulnerability WITHOUT any mention of coping, adaptation, resilience, or producer
      responses -> EXCLUDE. But if any behavioral or response element is mentioned, INCLUDE.
      A single brief mention of adaptation in an otherwise impact-focused or technology-focused
      abstract is not sufficient — the study must centrally analyze adaptation processes or
      outcomes, not just reference adaptation in background framing.

  3_context:
    name: "CONTEXT (Ag + Climate Risk)"
    include: "Agricultural settings explicitly exposed to climate hazards (drought, flood, variability, temperature rise)."
    exclude: "Non-agricultural sectors, or studies that do not link agricultural issues to climate change/variability."
    r1_include_further_guidelines: >
      Climate change, climate variability, or specific climate hazards must be explicitly
      referenced as central to the study — not just incidental or background context.
      Adaptation (not just impact assessment) must be central to the study purpose.
      Agricultural water management studies addressing increasing water scarcity, drought, or
      salinity under variable/changing climate qualify even if "climate change" is not explicitly
      named, provided the climate-linked hazard (e.g., groundwater depletion from erratic rainfall,
      irrigation salinity in arid/semi-arid regions) is clearly described as the driver.
    r1_exclude_further_guidelines: >
      Studies where climate is mentioned only incidentally or as background context with no
      direct link to the agricultural problem being studied. Studies where climate is clearly
      peripheral and not driving the research question.
    r2_include_further_guidelines: >
      A brief opening reference to climate change (e.g., "in the wake of recent climate changes")
      is sufficient climate context if the study then measures adoption of agricultural practices
      or adaptation responses — do not require climate change to be the primary focus of every
      sentence in the abstract.
      Studies on labor reallocation, off-farm income diversification, or migration in response
      to climate variability or agricultural stress qualify — these are climate adaptation
      responses even if analyzed through an economics or labor lens.
      Studies linking agricultural productivity changes to climate variability and then examining
      farmer responses qualify — the climate-productivity-response chain is sufficient context.
      Food security studies in LMIC contexts where climate variability is explicitly cited as
      a driver of food insecurity qualify when the study also examines coping or adaptive responses.
      Chronic food insecurity in LMIC agricultural contexts has an implied climate-agriculture
      link — do not require the words "climate change" to appear if the study is about rural
      smallholder livelihood diversification or coping in a food-insecure region.
    r2_exclude_further_guidelines: >
      Climate context must be explicit in the abstract. Exclude if the abstract does not
      explicitly reference climate change, climate variability, drought, flooding, extreme weather,
      or other specific climate stressors. Do not infer climate adaptation from generic terms
      such as "resilience", "environmental change", or "livelihood stress" alone — these
      terms without explicit climate linkage are insufficient for inclusion.

  4_methodology:
    name: "METHODOLOGY (Empirical Evidence)"
    include: "Must provide empirical evidence (qualitative or quantitative) or scenario-based testing of an intervention or tool."
    exclude: "Purely theoretical papers, conceptual frameworks without application, or review papers without primary data analysis."
    r1_include_further_guidelines: >
      Statistical or econometric models analyzing adaptation outcomes, adoption rates, or
      determinants of adoption qualify. Participatory assessments of adaptation or vulnerability
      qualify. Effectiveness evaluations using real-world or survey data qualify. Key principle:
      this review maps methods used to MEASURE adaptation — not the technologies themselves. A
      study evaluating 'how adoption is determined' or 'how effective an adaptation strategy is'
      qualifies even if a specific technology is the subject.
      Narrative or scoping reviews that systematically document and synthesize adaptation
      practices or adoption patterns across multiple empirical studies -> INCLUDE. The strict
      exclusion is for purely theoretical or conceptual papers with no empirical grounding at all.
      Agent-based models (ABMs) that simulate how smallholder farmers make adaptation or adoption
      decisions, calibrated using survey data or empirical parameters -> INCLUDE (they model
      adoption/adaptation processes at the producer level).
    r1_exclude_further_guidelines: >
      Pure technology performance modeling: simulates or optimizes how a crop variety or
      technology performs under climate scenarios without assessing producer-level adaptive
      behavior, adoption, or adaptation measurement. Heuristic: if it models 'how the technology
      performs' but not 'how adaptation is measured or adopted' -> exclude. Strategy or policy
      documents lacking methodological implementation. Pure predictive adoption modeling without
      empirical measurement context.
      Biophysical crop models (e.g., DSSAT, APSIM) that project yield under climate scenarios
      but do not include farmer decision-making, adoption behavior, or adaptation measurement
      at the household or producer level -> EXCLUDE.
    r2_include_further_guidelines: >
      Qualitative, ethnographic, or descriptive empirical studies that examine adaptation
      strategies or farmer responses to climate stress qualify even without a formal intervention
      or quantitative method. Do not require a project or externally introduced treatment.
    r2_exclude_further_guidelines: >
      Systematic reviews, literature reviews, meta-analyses, and opinion pieces -> HARD EXCLUDE.
      If the abstract identifies the paper as a "systematic review", "review with meta-analysis",
      "literature review", or similar synthesis — exclude immediately, even if it sounds empirical
      or uses quantitative methods. The only exception is a review whose central focus is
      specifically the methods used to measure climate adaptation (not reviews of technologies,
      CSA practices, or adaptation interventions).
      Policy and planning analyses aimed primarily at national or regional decision-makers
      (e.g., national adaptation planning frameworks, cost-benefit analyses for government
      investment priorities, broad stakeholder decision tools) -> EXCLUDE unless they clearly
      measure farmer- or household-level adaptation processes or outcomes.
      Technology and system performance studies -> EXCLUDE even if the technology is described
      as "climate-resilient" or an "adaptation strategy". This includes: crop and variety trials,
      aquaculture or agricultural system trials, pilot testing of technologies, research-station
      experiments, and technical performance modeling under climate scenarios. Include only when
      the study analyzes uptake, adoption, determinants of use, or adaptation behavior among
      producers — not just the performance of the technology itself.

  5_geography:
    name: "GEOGRAPHY (LMIC)"
    include: "Must be conducted in Low- or Middle-Income Countries (LMICs) or the Global South."
    exclude: "Exclusively High-Income / OECD countries (e.g., USA, UK, EU, Australia, Canada)."
    r1_include_further_guidelines: >
      A clear LMIC rural context can simultaneously satisfy both the geography and population
      criteria. If the study covers multiple countries including both OECD and LMIC, include it.
      IMPORTANT: China (all provinces and regions — Jiangsu, Shaanxi, Sichuan, northern, southern,
      coastal zones, etc.) is a middle-income country and QUALIFIES as an LMIC. Do NOT exclude
      China-based studies on geography grounds. Similarly, Thailand, Iran, Vietnam, Peru, Morocco,
      Tunisia, and other upper-middle-income countries in Asia, Africa, and Latin America qualify.
      For multi-country studies that include both LMIC and high-income countries (e.g., Peru +
      Germany + USA): include at abstract stage if a substantial portion of primary data or main
      conclusions relate to LMIC settings.
    r1_exclude_further_guidelines: >
      Exclude only when ALL study sites are exclusively in high-income OECD countries
      (USA, Canada, UK, Germany, France, Australia, Japan, South Korea, etc.) with no LMIC
      component. Do not exclude China or other middle-income Asian/African/Latin American countries.
    r2_include_further_guidelines: >
      South Africa is an upper-middle-income country and QUALIFIES as an LMIC — do NOT exclude
      studies conducted in South Africa on geography grounds.
      Any African, Asian, or Latin American country not explicitly in the high-income OECD list
      should be assumed to qualify at abstract screening stage. When in doubt, INCLUDE.
