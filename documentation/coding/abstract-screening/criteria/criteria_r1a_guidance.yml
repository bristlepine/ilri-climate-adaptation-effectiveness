Screening Calibration Guidance
Systematic Map: Measuring Climate Adaptation for Smallholder Producers
 Version: Post-Reconciliation (Feb 23, 26, 27 Discussions)

Purpose
This guidance reflects decisions reached during three reconciliation discussions to improve screening consistency and inter-rater reliability. It clarifies how inclusion and exclusion criteria should be interpreted at the title–abstract screening stage.
The goal is to ensure consistent operationalization of what counts as:
Measuring adaptation


Tracking adaptation processes


Applying a measurement method


Distinguishing measurement from technology or hazard modeling



Core Inclusion Criteria
A study should be included at title–abstract stage if all of the following are met:

1. Climate Adaptation Context
Climate change, climate variability, or specific climate hazards are explicitly referenced.


Adaptation (not just impact) is central to the study.


Exclude if climate is incidental or background only.

2. Smallholder Agricultural Producers
Explicit reference to smallholder farmers OR


Clear LMIC rural producer context implying small-scale agriculture.


Mixed samples → Include at abstract stage.
Purely agronomic or biophysical crop trials with no producer-level focus → Exclude.

3. Measures an Adaptation Process or Outcome
Include if the study:
Measures adaptation outcomes (e.g., yield under drought, income stability, adaptive capacity, resilience, vulnerability reduction).


Evaluates an adaptation intervention.


Assesses adoption or uptake of adaptation technologies.


Identifies determinants of adoption.


Key clarification:
 Determinants of uptake count as measuring an adaptation process and should be included.

4. Applies or Analyzes a Measurement Method
Include if the study:
Applies indicators or evaluation frameworks.


Uses statistical or econometric models to analyze adaptation outcomes or adoption.


Conducts participatory assessments of adaptation or vulnerability.


Evaluates effectiveness of adaptation actions using empirical data.


Important:
 We are mapping methods used to measure adaptation — not mapping technologies themselves.

Exclusion Criteria (Operational Clarifications)
Exclude if any of the following apply:

1. Pure Technology Performance Modeling
Simulates or models crop/technology performance under climate scenarios.


Optimizes technical efficiency.


Evaluates agronomic response without assessing adaptive behavior or adaptation measurement.


If it models “how the technology performs” but not “how adaptation is measured” → Exclude.

2. Hazard Impact Only
Measures climate impacts on crops or income.


Does not assess adaptation action or adaptation process.



3. Conceptual Only
Frameworks without empirical application, unless they are guidance for empirical application.


Indicator discussions without applied data.


Strategy/policy documents lacking methodological implementation.



4. General CSA Discussion Without Measurement
Describes climate-smart agriculture conceptually.


Does not evaluate uptake, process, or outcomes.



Borderline Clarifications
Adoption Studies
Determinants of adoption → Include.


Descriptive reporting of adoption rates → Include.


Pure predictive modeling without measurement context → Exclude.


Modeling Studies
Evaluates effectiveness of adaptation strategy using real-world data → Include.


Pure simulation of theoretical crop/technology performance → Exclude.


Resilience Studies
Climate-linked resilience measurement → Include.


Generic development resilience without climate framing → Exclude.



Screening Heuristic
At title–abstract stage, ask:
Does this study use a method to measure or analyze how smallholder producers adapt to climate risks?
If yes → Include.
 If clearly no → Exclude.
 If unclear → Include for full text.

