LLM Calibration Addendum
Supplement to Screening Calibration Guidance
 Version: Post-Reconciliation (Mar 6 Discussion)
Purpose
This addendum supplements the existing Screening Calibration Guidance and is intended specifically to improve alignment between the LLM and the reconciled human screening decisions. It should be read together with the main guidance rather than as a replacement. The goal is to reduce recurring LLM errors in borderline cases where the human reviewers reached consensus after reconciliation.
The main guidance already defines the core inclusion and exclusion logic for title–abstract screening. This addendum provides additional clarifications based on patterns observed during the second reconciliation process.

Priority Principle for the LLM
The LLM should prioritize the following question:
Is this study actually measuring or analyzing adaptation processes or outcomes among relevant producer populations, rather than describing technologies, impacts, reviews, or broad policy/research agendas?
If the abstract mainly describes:
a technology,


a review of prior literature,


climate impacts without actual adaptation analysis,


or a broad policy/planning exercise not tied to farmer- or household-level adaptation,


the default decision should usually be Exclude.

Addendum Rule 1: Reviews should almost always be excluded
The LLM has been too likely to include systematic reviews and review-like papers. The human team excluded these unless they were very specifically and centrally about measurement methods themselves.
Reviews of adaptation technologies, reviews of CSA adoption, reviews of ICT initiatives, and similar review papers should be excluded.
LLM decision rule
Exclude if the abstract identifies the paper as:
a systematic review


a review


a review of academic or gray literature


a meta-analysis


an opinion piece


unless the abstract makes clear that the central object of study is adaptation measurement methods themselves.
Specific clarification
A review of adoption, CSA practices, technologies, or interventions is not sufficient for inclusion. The study must specifically review methods used to measure adaptation.

Addendum Rule 2: Policy- and planning-level decision support pieces should usually be excluded
The LLM appears to over-include papers that sound methodological because they use tools such as cost-benefit analysis. However, if the paper uses such tools to advise governments or broad policy actors rather than measuring farmer or household adaptation, it should be excluded.
LLM decision rule
Exclude if the abstract mainly evaluates or recommends:
national or regional planning pathways


public investment programs


government policy priorities


broad stakeholder decision frameworks


and does not clearly demonstrate farmer-, household-, or community-level measurement of adaptation processes or outcomes.

Addendum Rule 3: Technology papers remain out, even if adaptation language is used
The LLM still tends to over-include papers on the performance, development, or deployment of technologies. The human reviewers consistently excluded papers that evaluated technologies themselves rather than examining how people use them or how adaptation is measured.
LLM decision rule
Exclude if the abstract is primarily about:
crop or variety trials


aquaculture system trials


performance of storage, cooling, or irrigation technologies


research station experiments


development or deployment of a technology


pilot testing of a technology


claims that a system “emerged as a potentially climate-resilient system”


Key distinction
Include only if the paper clearly studies:
uptake or adoption


determinants of use


adaptation behavior


adaptation outcomes


or measurement of adaptation among producers or households.


Do not include a study simply because it describes a technology as “climate resilient” or an “adaptation strategy.”

Addendum Rule 4: Vulnerability papers should be included only when they also assess adaptation or adaptive capacity
The LLM appears to under-include some vulnerability papers that human reviewers included. Vulnerability studies were included when they clearly assessed adaptation strategies, adaptation measures, adaptive capacity, livelihood responses, or coping responses.
They were excluded when vulnerability or poverty was the dominant focus and adaptation was vague or incidental.
LLM decision rule
Include vulnerability papers when the abstract explicitly states that the study examines:
adaptation measures implemented


adaptation strategies


adaptive capacity


livelihood responses


coping or anticipatory responses


farmer responses to climate risk.


Exclude vulnerability papers when the abstract mainly focuses on:
poverty


food insecurity


generalized vulnerability


climate impacts


without clearly assessing adaptation processes or outcomes.

Addendum Rule 5: Qualitative and anthropological studies can be included even without an external intervention
The LLM should not assume that a study must include an externally introduced intervention. Autonomous or farmer-led adaptation also qualifies.
A qualitative case study can be included if it examines adaptation strategies, responses, or behaviors in response to climate stressors.
LLM decision rule
Do not exclude a study simply because:
there is no project intervention


the study is qualitative


the study is anthropological


the study is descriptive in method.


Include when the abstract clearly indicates that the study examines:
adaptation strategies


farmer or pastoralist responses


adaptation behavior


management responses to climate stress.



Addendum Rule 6: Climate context must be explicit
The LLM has sometimes over-included studies that use terms such as resilience, adaptive livelihoods, or environmental stress without clearly linking them to climate change.
LLM decision rule
Exclude if the abstract does not explicitly reference:
climate change


climate variability


drought


flooding


extreme weather


or other climate-related stressors.


Do not infer climate adaptation from generic terms such as resilience or environmental change.

Addendum Rule 7: Smallholder population must be plausible
The LLM should be cautious when the abstract clearly refers to commercial agriculture or large-scale producers.
LLM decision rule
Exclude if the population clearly consists of:
commercial growers


large commercial farms


non-smallholder production systems.


Include when the population is mixed or unclear and a smallholder context remains plausible.

Addendum Rule 8: A single sentence mentioning adaptation should not override the rest of the abstract
Some abstracts mention adaptation briefly even though the paper primarily analyzes impacts, technologies, or environmental trends.
LLM decision rule
Exclude when:
adaptation appears only briefly in the abstract,


and the study mainly focuses on climate impacts, environmental trends, or technological performance.


Adaptation must be part of the actual analysis, not simply mentioned as a motivation.

Addendum Rule 9: Poorly written abstracts may still be eligible
Some studies may be poorly written but still contain the required signals for inclusion.
LLM decision rule
Do not exclude a study solely because the abstract is poorly written or grammatically weak.
If the abstract still clearly signals:
climate adaptation context,


relevant producer population,


and examination of adaptation strategies or adaptive capacity,


then it should be included.

LLM Tie-Breaker Logic
When uncertain, apply the following priority order:
Explicit climate adaptation context


Relevant smallholder or low-income producer population


Adaptation processes or outcomes assessed


Measurement or analysis of those processes or outcomes


Not primarily a review, technology paper, impact-only study, or policy piece.


If criteria 1 through 4 are present and criterion 5 is not violated, include.
If criterion 5 is clearly violated, exclude.

Compact LLM Checklist
Before assigning Include, the LLM should verify the following:
The abstract explicitly references climate risk, climate change, or climate hazards.


The population plausibly includes smallholder or low-income producers.


The study examines adaptation strategies, responses, uptake, adaptive capacity, or adaptation outcomes.


The study is primary empirical research or a clearly relevant methodological study.


The study is not primarily a review, policy note, opinion piece, technology trial, or impact-only study.


If the final condition is violated, the study should usually be excluded.

-----

LLM Screening Prompt Block
When screening a title and abstract, determine whether the study should be Included or Excluded based on the following rules:
Include only studies that explicitly analyze climate adaptation processes or outcomes among agricultural producers.


The study must reference climate change, climate variability, or climate hazards (e.g., drought, flooding, extreme weather); do not infer climate relevance from words like “resilience” alone.


The population must plausibly include smallholder, subsistence, or low-income agricultural producers; exclude studies focused on commercial or large-scale farms.


Include studies that measure or analyze adaptation, such as adaptation strategies, uptake/adoption of practices, determinants of adoption, adaptive capacity, coping responses, or adaptation outcomes.


Exclude review papers, systematic reviews, meta-analyses, opinion pieces, or literature syntheses unless the review specifically examines methods used to measure adaptation.


Exclude technology or agronomic performance studies, such as variety trials, system trials, technology pilots, or technical performance modeling, unless they analyze adoption, behavior, or adaptation outcomes among producers.


Exclude climate impact-only studies that assess effects of climate hazards but do not analyze adaptation actions or responses.


Exclude policy or planning analyses aimed primarily at national or regional decision-makers if they do not measure farmer or household adaptation processes.


Include qualitative or case studies if they examine real adaptation behavior or strategies among producers, even without a formal intervention.


If adaptation is mentioned only briefly but the study mainly analyzes impacts, technology performance, or environmental change, exclude.


Decision rule:
 Include only when the abstract clearly shows climate context + relevant producer population + analysis of adaptation processes or outcomes.



