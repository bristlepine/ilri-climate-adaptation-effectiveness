After a subsequent screening round, a second reconciliation discussion was held on 6 March 2026, where the team reviewed the remaining disagreements and cases where an LLM-assisted screening process diverged from the human reviewers. Additional operational clarifications were documented to further refine the interpretation of borderline cases and improve screening consistency (see Annex X Addendum).
Annex X. Screening Calibration and Operational Decision Rules
Title–Abstract Screening Stage
Purpose
Following an initial consistency check of title–abstract screening decisions, the review team conducted structured reconciliation discussions to clarify interpretation of the eligibility criteria. These discussions aimed to improve inter-rater reliability and ensure consistent operationalization of the review’s Population–Concept–Context–Methodological Focus (PCCM) framework.
This annex documents the operational decision rules agreed upon during reconciliation. These rules do not modify the original eligibility criteria; rather, they clarify how the criteria are to be interpreted and applied during screening.

Guiding Principle
This systematic map focuses on methods used to measure, evaluate, or analyze climate adaptation processes and outcomes for smallholder agricultural producers.
The review maps measurement approaches, not adaptation technologies per se and not climate impacts alone.

Operational Inclusion Rules
At title–abstract stage, a study should be included if all of the following conditions are met:
1. Climate Adaptation Context
Climate change, climate variability, or specific climate hazards (e.g., drought, heat, flooding, extreme rainfall) are explicitly referenced; and


Adaptation is central to the study, not incidental or mentioned only in background.


Studies in which climate is referenced only in introductory framing, without connection to measured processes or outcomes, are excluded.

2. Smallholder Agricultural Producers
The study focuses on smallholder farmers or equivalent producer categories; or


The study clearly concerns rural agricultural producers in low- or middle-income country contexts where small-scale production is implicit.


Mixed samples (small and larger producers) are retained at abstract stage unless clearly dominated by large commercial operations.
Purely agronomic or biophysical crop trials without producer-level relevance are excluded.

3. Measurement of Adaptation Processes or Outcomes
The study must measure or analyze at least one of the following:
Adaptation outcomes (e.g., yield under climate stress, income stability, vulnerability reduction, adaptive capacity, resilience linked to climate hazards);


Implementation or effectiveness of an adaptation intervention;


Adoption or uptake of adaptation technologies or practices;


Determinants of adoption or uptake of adaptation technologies or practices.


Clarification:
 Studies identifying determinants of uptake are considered to be measuring an adaptation process and are therefore included.
Descriptive reporting of adoption rates also qualifies as tracking adaptation processes.

4. Application of a Measurement Method
The study must apply or analyze a method used to measure adaptation processes or outcomes. This includes:
Indicator-based assessments;


Evaluation frameworks;


Statistical or econometric analyses of adaptation outcomes or adoption;


Participatory vulnerability or resilience assessments linked to climate hazards;


Empirical evaluations of adaptation interventions.


The review maps methodological approaches to measurement. Studies that only describe technologies, practices, or adaptation strategies without evaluating or measuring them are excluded.

Operational Exclusion Rules
A study is excluded at title–abstract stage if any of the following apply:
1. Pure Technology Performance Modeling
The study simulates, models, or optimizes performance of a crop, input, or technology under climate scenarios;


The focus is on technical efficiency or agronomic response without assessing adaptive behavior or measuring adaptation processes or outcomes.


Clarification:
 If the study models “how the technology performs” but does not measure “how adaptation is assessed or evaluated,” it is excluded.

2. Hazard Impact Only
The study measures impacts of climate hazards on crops, production, or income;


No adaptation action or adaptation process is evaluated.



3. Conceptual or Framework-Only Studies
The study presents conceptual frameworks or indicator sets without empirical application;


The study is a policy or strategy document lacking applied methodological detail.



4. General Adaptation or CSA Discussion Without Measurement
The study discusses climate-smart agriculture or adaptation conceptually;


No uptake, implementation, outcome, or measurement method is assessed.



Borderline Clarifications
The following clarifications were agreed upon to improve consistency:
Determinants of adoption are considered adaptation process measurement and are included.


Descriptive reporting of adoption rates qualifies as process tracking and is included.


Predictive modeling of technology performance without measurement of adaptation processes or outcomes is excluded.


Resilience studies are included only if resilience is explicitly linked to climate hazards and measured empirically.


Generic development resilience studies without climate framing are excluded.



Screening Heuristic
At title–abstract stage, reviewers apply the following decision test:
Does this study use a method to measure or analyze how smallholder agricultural producers adapt to climate risks?
If yes → include.
 If clearly no → exclude.
 If unclear → retain for full-text screening.

Role in Consistency Checking
These operational rules were formalized after initial double-screening and reconciliation discussions among reviewers. They guide subsequent screening rounds and will be referenced when reporting consistency statistics in the final review.
Annex X Addendum
Additional Operational Clarifications Following Second Reconciliation
Following a second consistency check and reconciliation exercise, the review team conducted an additional round of calibration discussions to further improve screening consistency and align interpretation of borderline cases. These discussions occurred after a subsequent batch of title–abstract screening, during which inter-rater agreement between human reviewers exceeded a kappa score of 0.7.
The clarifications below refine the operational rules already described in this annex. They do not change the eligibility criteria but further specify how they should be interpreted during title–abstract screening.

Additional Clarification 1: Review Articles
Review papers should generally be excluded.
This includes studies identified as:
literature reviews


systematic reviews


meta-analyses


syntheses of academic and grey literature


unless the central focus of the review is methods used to measure climate adaptation.
Reviews of adaptation technologies, climate-smart agriculture practices, ICT initiatives, or adaptation interventions do not meet the inclusion criteria unless they explicitly analyze or compare measurement approaches.

Additional Clarification 2: Policy and Planning Analyses
Studies focused primarily on policy planning, national strategies, or broad stakeholder decision-making processes should be excluded unless they clearly measure adaptation processes or outcomes among producer populations.
Examples typically excluded include:
national or regional adaptation planning frameworks


cost–benefit analyses used for policy prioritization


strategic investment or planning tools aimed primarily at government or institutional actors.


Inclusion requires clear measurement or analysis of farmer- or household-level adaptation behavior or outcomes.

Additional Clarification 3: Technology and System Performance Studies
Studies that evaluate the technical performance of technologies or production systems should be excluded unless they examine adaptation behavior among producers.
Examples include:
crop or variety trials


aquaculture or agricultural system trials


pilot testing of technologies


research-station experiments


modeling of technical performance under climate scenarios.


Such studies are excluded even if the technology is described as climate-resilient or an adaptation strategy.
Studies are included only when they analyze:
uptake or adoption of practices


determinants of adoption


adaptation behavior


or adaptation outcomes among producers.



Additional Clarification 4: Vulnerability Studies
Vulnerability studies may be included when they explicitly analyze adaptation responses or adaptive capacity.
Examples of acceptable adaptation-related measures include:
adaptation strategies implemented


coping or anticipatory responses


adaptive capacity indicators


livelihood responses to climate stress.


Vulnerability studies should be excluded when the primary focus is:
poverty or development vulnerability


food insecurity


climate impacts


without assessing adaptation processes or responses.

Additional Clarification 5: Qualitative and Autonomous Adaptation Studies
Studies examining autonomous or farmer-led adaptation responses may be included even when no formal intervention or project is present.
Qualitative, ethnographic, or case-study research may therefore be included when it clearly examines:
adaptation strategies


management responses to climate stress


behavioral responses to climate variability.



Additional Clarification 6: Explicit Climate Context
Climate context must be explicit in the abstract.
Studies should be excluded when climate relevance is only implied through general terms such as resilience, environmental change, or livelihood stress without clear reference to climate change, climate variability, or climate hazards.

Additional Clarification 7: Producer Population
Studies should be excluded when the population clearly consists of large-scale commercial producers or commercial agriculture systems.
Studies with mixed or unclear populations may be retained at title–abstract stage when smallholder participation remains plausible.

Additional Clarification 8: Incidental Mentions of Adaptation
Studies should not be included solely because adaptation is mentioned briefly in the abstract.
When the primary focus of the study concerns climate impacts, environmental change, or technological performance rather than analysis of adaptation processes or outcomes, the study should be excluded.

